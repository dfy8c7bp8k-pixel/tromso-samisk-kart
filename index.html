<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="utf-8" />
  <title>Samiske stedsnavn – Tromsø</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />

  <!-- Leaflet JS -->
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>

  <style>
    body {
      margin: 0;
    }

    #map {
      height: 100vh;
      width: 100vw;
    }

    .popup-samisk {
      font-size: 16px;
      font-weight: 600;
      margin: 0 0 2px 0;
    }

    .popup-norsk {
      font-size: 13px;
      margin: 0;
      opacity: 0.85;
    }

    /* Språkblokker */
    .popup-lang {
      display: flex;
      gap: 8px;
      margin-top: 10px;
      align-items: flex-start;
    }

    .lang-icon {
      width: 22px;
      height: auto;
      margin-top: 2px;
      flex: 0 0 auto;
    }

    .popup-text {
      font-size: 13px;
      line-height: 1.4;
    }

    .popup-text p {
      margin: 0 0 6px 0;
    }

    .popup-text a {
      text-decoration: none;
      color: #0066cc;
    }

    .popup-text a:hover {
      text-decoration: underline;
    }

    #lang-switcher {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 1000;
      background: white;
      border-radius: 6px;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.3);
    }

    #lang-switcher button {
      border: none;
      background: none;
      padding: 6px 10px;
      cursor: pointer;
      font-weight: 600;
    }

    #lang-switcher button.active {
      background: #eee;
    }

    .lang-switcher a {
      display: inline-block;
      padding: 6px 10px;
      text-decoration: none;
      color: #111;
      background: #fff;
      border-right: 1px solid #ddd;
      font-weight: 700;
    }

    .lang-switcher a:last-child {
      border-right: none;
    }

    .lang-switcher a.active {
      background: #eee;
    }
    .custom-svg-marker {
      background: transparent;
      border: none;
    }

    .marker-shell {
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: visible;
    }

    .marker-inner {
      width: 100%;
      height: 100%;
      object-fit: contain;
      transform-origin: center center;
      will-change: transform;
      transition: none;
    }
  </style>
</head>
<body>

  <div id="map"></div>

  <!-- App -->
  <script src="./app.js"></script>
</body>
</html>
